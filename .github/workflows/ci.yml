name: CI

on:
  push:
    branches: [main, "release/**"]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Verify Install
    runs-on: macos-14  # Apple Silicon (M1)
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Version consistency check
        run: |
          FILE_VER=$(cat VERSION)
          APP_VER=$(grep -oE '__version__ = "[^"]+"' app.py | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          echo "VERSION file: $FILE_VER"
          echo "app.py:       $APP_VER"
          if [ "$FILE_VER" != "$APP_VER" ]; then
            echo "::error::VERSION ($FILE_VER) != app.py __version__ ($APP_VER)"
            exit 1
          fi

      - name: Install dependencies
        run: |
          python -m venv venv
          venv/bin/pip install --upgrade pip
          venv/bin/pip install -r requirements.txt

      - name: Import check
        run: |
          venv/bin/python -c "
          import rumps, mlx_whisper, pynput, sounddevice
          import pyperclip, certifi, opencc, numpy
          print('All imports OK')
          "

      - name: Syntax check
        run: venv/bin/python -m py_compile app.py

      - name: Script syntax
        run: |
          bash -n install.sh
          bash -n scripts/bump_version.sh
          bash -n scripts/build.sh
          bash -n scripts/release.sh
          bash -n tests/test_install.sh

  release:
    name: Release & Publish
    runs-on: macos-14
    needs: verify
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    outputs:
      version: ${{ steps.meta.outputs.version }}
      sha256: ${{ steps.meta.outputs.sha256 }}
    steps:
      - uses: actions/checkout@v4

      - name: Build source tarball
        run: bash scripts/build.sh

      - name: Extract version and SHA256
        id: meta
        run: |
          VERSION=$(cat VERSION)
          SHA=$(awk '{print $1}' dist/MacWhisper-${VERSION}.tar.gz.sha256)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"
          echo "SHA256:  $SHA"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.meta.outputs.version }}
          TAG="v${VERSION}"
          cat > /tmp/release_notes.md << 'NOTES'
          ## MacWhisper $TAG

          ### Install via Homebrew (recommended)
          ```bash
          brew tap sfc-gh-jiyan/macwhisper
          brew install macwhisper-mlx
          macwhisper-mlx-install
          ```

          ### Manual install
          ```bash
          curl -L https://github.com/sfc-gh-jiyan/MacWhisper/releases/download/$TAG/MacWhisper-${VERSION}.tar.gz | tar xz
          cd MacWhisper-${VERSION}
          bash install.sh
          ```
          NOTES
          # Substitute variables in release notes
          sed -i '' "s/\$TAG/$TAG/g; s/\${VERSION}/$VERSION/g" /tmp/release_notes.md

          gh release create "$TAG" \
            "dist/MacWhisper-${VERSION}.tar.gz" \
            --title "MacWhisper $TAG" \
            --notes-file /tmp/release_notes.md

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MacWhisper-tarball
          path: dist/MacWhisper-*.tar.gz

  update-homebrew:
    name: Update Homebrew Tap
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: sfc-gh-jiyan/homebrew-macwhisper
          token: ${{ secrets.TAP_GITHUB_TOKEN }}

      - name: Update formula
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          SHA256="${{ needs.release.outputs.sha256 }}"
          FORMULA="Formula/macwhisper-mlx.rb"

          echo "Updating formula to v${VERSION} (sha256: ${SHA256})"

          sed -i "s|url \".*\"|url \"https://github.com/sfc-gh-jiyan/MacWhisper/releases/download/v${VERSION}/MacWhisper-${VERSION}.tar.gz\"|" "$FORMULA"
          sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|" "$FORMULA"

          echo "Updated formula:"
          grep -E 'url |sha256 ' "$FORMULA"

      - name: Commit and push
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/macwhisper-mlx.rb
          git commit -m "Update macwhisper-mlx to v${VERSION}"
          git push
