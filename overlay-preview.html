<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>MacWhisper 浮窗预览 — Zoom 风格</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw;
    height: 100vh;
    background: url('https://images.unsplash.com/photo-1517336714731-489689fd1ca8?w=1920&q=80') center/cover no-repeat;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
    overflow: hidden;
  }

  .panel {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    width: 720px;
    max-height: 50vh;
    overflow-y: auto;
    background: rgba(0, 0, 0, 0.88);
    border-radius: 10px;
    padding: 14px 20px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    transition: height 0.15s ease;
  }

  .panel .line {
    color: rgba(255, 255, 255, 0.92);
    font-size: 15px;
    line-height: 1.55;
    opacity: 0;
    transform: translateY(4px);
    animation: fadeIn 0.25s ease forwards;
  }

  .panel .line.typing {
    color: rgba(255, 255, 255, 0.5);
  }

  @keyframes fadeIn {
    to { opacity: 1; transform: translateY(0); }
  }

  .bg-switcher {
    position: fixed;
    top: 20px;
    right: 20px;
    display: flex;
    gap: 8px;
    z-index: 10;
  }
  .bg-switcher button {
    padding: 6px 12px;
    border: 1px solid rgba(255,255,255,0.5);
    border-radius: 6px;
    background: rgba(0,0,0,0.4);
    color: white;
    font-size: 13px;
    cursor: pointer;
    font-family: -apple-system, sans-serif;
  }
  .bg-switcher button:hover { background: rgba(0,0,0,0.6); }
  .bg-switcher button.active { background: rgba(255,255,255,0.2); border-color: white; }

  .controls {
    position: fixed;
    top: 20px;
    left: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 10;
  }
  .controls button {
    padding: 8px 16px;
    border: none;
    border-radius: 8px;
    background: rgba(255, 149, 0, 0.9);
    color: white;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    font-family: -apple-system, sans-serif;
  }
  .controls button:hover { background: rgba(255, 149, 0, 1); }
  .controls .hint {
    color: rgba(255,255,255,0.5);
    font-size: 12px;
    max-width: 200px;
  }

  .status {
    position: fixed;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.4);
    font-size: 11px;
  }
</style>
</head>
<body>

<div class="controls">
  <button onclick="restart()">重新播放</button>
  <button onclick="clearPanel()">清空面板</button>
  <div class="hint">模拟说话过程：文字逐行累积，面板自动变高</div>
</div>

<div class="bg-switcher">
  <button onclick="setBg('https://images.unsplash.com/photo-1517336714731-489689fd1ca8?w=1920&q=80')">桌面</button>
  <button onclick="setBg('https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=1920&q=80')">自然</button>
  <button onclick="document.body.style.background='#1a1a1a'">深色</button>
  <button onclick="document.body.style.background='#f5f5f5'">浅色</button>
</div>

<div class="panel" id="panel"></div>

<script>
function setBg(url) {
  document.body.style.background = `url('${url}') center/cover no-repeat`;
}

const sentences = [
  "I was at a conference in San Francisco last week.",
  "The keynote speaker talked about how large language models are transforming the way engineers write code and debug production systems in real time.",
  "我觉得最有意思的部分是他们演示的那个语音转代码的 pipeline，可以用自然语言直接生成 Python 脚本。",
  "One thing that really stood out was the privacy-first approach — all inference running locally on Apple Silicon, no cloud dependency.",
  "他讲的核心观点是未来三到五年内，大部分软件开发流程都会被 AI 辅助工具深度改变。",
  "From code writing to testing, deployment, and production monitoring, every single step will have AI involvement.",
  "另外一个演示是实时语音翻译系统，延迟非常低，体验非常流畅，字幕几乎是同步出现的。",
  "I think this is exactly the direction we should be heading — fast, local, private.",
  "会议结束之后我们几个人一起吃了个饭，讨论了一下接下来的合作计划。",
  "So yeah, overall a very productive trip. I'll write up a summary and share it with the team tomorrow.",
];

const panel = document.getElementById('panel');
let timer = null;
let idx = 0;
let typingEl = null;

function addLine(text, isTyping) {
  const div = document.createElement('div');
  div.className = 'line' + (isTyping ? ' typing' : '');
  div.textContent = text;
  panel.appendChild(div);
  panel.scrollTop = panel.scrollHeight;
  return div;
}

function step() {
  if (idx >= sentences.length) {
    clearInterval(timer);
    return;
  }

  if (typingEl) {
    typingEl.classList.remove('typing');
  }

  typingEl = addLine(sentences[idx], idx < sentences.length - 1);
  idx++;
}

function restart() {
  clearInterval(timer);
  panel.innerHTML = '';
  idx = 0;
  typingEl = null;
  timer = setInterval(step, 4000);
  step();
}

function clearPanel() {
  clearInterval(timer);
  panel.innerHTML = '';
  idx = 0;
  typingEl = null;
}

restart();
</script>

</body>
</html>
